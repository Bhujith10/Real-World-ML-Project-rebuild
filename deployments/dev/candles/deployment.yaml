# Candles service Kubernetes Deployment
#
# Runs the candles service inside the cluster.
# Consumes from "trades" topic, produces to "candles" topic.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: candles
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: candles
  template:
    metadata:
      labels:
        app: candles
    spec:
      containers:
        - name: candles
          image: candles:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER_ADDRESS
              value: "kafka-0.kafka-headless.kafka.svc.cluster.local:9092"
            - name: KAFKA_INPUT_TOPIC
              value: "trades"
            - name: KAFKA_OUTPUT_TOPIC
              value: "candles"
            - name: KAFKA_CONSUMER_GROUP
              value: "candles-service"
            - name: CANDLE_SECONDS
              value: "60"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
