# Kustomize — a tool for customizing Kubernetes manifests without templating.
#
# It lets you define a "base" set of manifests and apply overlays (patches)
# for different environments (dev, staging, prod) without duplicating files.
#
# Usage: kubectl apply -k deployments/dev/trades/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml

configMapGenerator:
  - name: trades-config
    literals:
      - KAFKA_BROKER_ADDRESS=kafka-0.kafka-headless.kafka.svc.cluster.local:9092
      - KAFKA_TOPIC=trades
      - PAIRS=BTC/USD
      - LOG_FORMAT=json
