# Trades service Kubernetes Deployment
#
# Runs the trades service inside the cluster where it can natively reach Kafka
# via the in-cluster DNS name (no port-forwarding needed).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: trades
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trades
  template:
    metadata:
      labels:
        app: trades
    spec:
      containers:
        - name: trades
          image: trades:dev
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER_ADDRESS
              value: "kafka-0.kafka-headless.kafka.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "trades"
            - name: PAIRS
              value: "BTC/USD"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
