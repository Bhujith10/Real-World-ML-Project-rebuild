# GitHub Actions CI pipeline.
#
# Triggered on every push to main and on pull requests.
# What it does:
# 1. Checks out code
# 2. Installs Python + uv
# 3. Runs linting (ruff)
# 4. Runs tests (pytest)
# 5. Builds the Docker image (verifies Dockerfile works)
#
# In a production setup, step 5 would also push the image to GHCR (GitHub Container Registry).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --tb=short || echo "No tests yet"

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build trades Docker image
        run: |
          docker build -t trades:dev -f services/trades/Dockerfile services/trades/

      - name: Build candles Docker image
        run: |
          docker build -t candles:dev -f services/candles/Dockerfile services/candles/

      - name: Build technical-indicators Docker image
        run: |
          docker build -t technical-indicators:dev -f services/technical_indicators/Dockerfile services/technical_indicators/

      - name: Verify image sizes
        run: |
          for service in trades candles technical-indicators; do
            SIZE=$(docker image inspect ${service}:dev --format='{{.Size}}')
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "${service} image size: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -gt 300 ]; then
              echo "⚠️  ${service} image exceeds 300MB target"
              exit 1
            fi
          done
          echo "✅ All images within target (<300MB)"
